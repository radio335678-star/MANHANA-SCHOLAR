openapi: "3.1.0"
info:
  title: Api
  version: "1.0.0"
  description: MANTHANA-SCHOLER — AI-powered thesis and research writing platform for Indian medical scholars

servers:
  - url: /api

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── REFERENCE DATA ──────────────────────────────────────────────────────────
  /reference/domains:
    get:
      operationId: listDomains
      summary: List medical domains
      tags: [reference]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"

  /reference/qualifications:
    get:
      operationId: listQualifications
      summary: List academic qualifications
      tags: [reference]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Qualification"

  /reference/colleges:
    get:
      operationId: listColleges
      summary: List medical colleges
      tags: [reference]
      parameters:
        - in: query
          name: domain
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/College"

  /reference/universities:
    get:
      operationId: listUniversities
      summary: List affiliating universities
      tags: [reference]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/University"

  # ─── USER PROFILE ────────────────────────────────────────────────────────────
  /profile:
    get:
      operationId: getProfile
      summary: Get authenticated user profile
      tags: [profile]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: upsertProfile
      summary: Create or update user profile
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      summary: Dashboard summary stats
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      summary: Recent activity feed
      tags: [dashboard]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  # ─── WORKSPACES ──────────────────────────────────────────────────────────────
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces for the authenticated user
      tags: [workspaces]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, completed, archived]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"

    post:
      operationId: createWorkspace
      summary: Create a new workspace
      tags: [workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      summary: Get a workspace
      tags: [workspaces]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateWorkspace
      summary: Update a workspace
      tags: [workspaces]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

    delete:
      operationId: deleteWorkspace
      summary: Delete a workspace
      tags: [workspaces]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workspaces/{id}/progress:
    get:
      operationId: getWorkspaceProgress
      summary: Get section completion progress
      tags: [workspaces]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceProgress"

  /workspaces/{id}/workflow:
    get:
      operationId: getWorkspaceWorkflow
      summary: Get workflow state and allowed transitions
      tags: [workspaces]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [workflowState, allowedTransitions]
                properties:
                  workflowState:
                    type: string
                  allowedTransitions:
                    type: array
                    items:
                      type: string

  /workspaces/{id}/workflow/transition:
    post:
      operationId: transitionWorkspaceWorkflow
      summary: Transition workspace workflow state
      tags: [workspaces]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetState]
              properties:
                targetState:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: OK

  /workspaces/{id}/pre-thesis:
    get:
      operationId: getPreThesis
      summary: Get pre-thesis draft, checklist, conflicts
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
    patch:
      operationId: patchPreThesis
      summary: Update pre-thesis checklist, notes, or draft MD
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /workspaces/{id}/pre-thesis/build:
    post:
      operationId: buildPreThesis
      summary: Start 4-agent pre-thesis build job
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Job started

  /workspaces/{id}/pre-thesis/synopsis:
    post:
      operationId: uploadPreThesisSynopsis
      summary: Upload synopsis for blueprint generation
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /workspaces/{id}/pre-thesis/chat:
    get:
      operationId: listPreThesisChat
      summary: List pre-thesis assistant messages
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
    delete:
      operationId: clearPreThesisChat
      summary: Clear pre-thesis assistant conversation
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /workspaces/{id}/pre-thesis/chat/stream:
    post:
      operationId: streamPreThesisChat
      summary: Stream pre-thesis AI assistant (SSE)
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: SSE stream

  /workspaces/{id}/pre-thesis/revisions/undo:
    post:
      operationId: undoPreThesisRevision
      summary: Undo last AI document revision
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /workspaces/{id}/pre-thesis/export.docx:
    get:
      operationId: exportPreThesisDocx
      summary: Download pre-thesis as DOCX
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: DOCX file

  /reference/departments:
    get:
      operationId: listDepartments
      summary: List PG departments by domain
      tags: [reference]
      parameters:
        - in: query
          name: domain
          schema:
            type: string
      responses:
        "200":
          description: OK

  /workspaces/{id}/pre-thesis/lock:
    post:
      operationId: lockPreThesis
      summary: Lock pre-thesis MD with SHA-256 audit
      tags: [pre-thesis]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Locked

  /workspaces/{workspaceId}/master-charts:
    get:
      operationId: listMasterCharts
      summary: List master charts for workspace
      tags: [master-charts]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
    post:
      operationId: createMasterChart
      summary: Create master chart
      tags: [master-charts]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created

  # ─── SECTIONS ────────────────────────────────────────────────────────────────
  /workspaces/{workspaceId}/sections:
    get:
      operationId: listSections
      summary: List sections in a workspace
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"

    post:
      operationId: createSection
      summary: Create a section
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

  /workspaces/{workspaceId}/sections/{sectionId}:
    get:
      operationId: getSection
      summary: Get a section
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

    patch:
      operationId: updateSection
      summary: Update a section
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

    delete:
      operationId: deleteSection
      summary: Delete a section
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workspaces/{workspaceId}/sections/reorder:
    post:
      operationId: reorderSections
      summary: Reorder all sections in a workspace
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionReorderInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"

  /workspaces/{workspaceId}/sections/scaffold:
    post:
      operationId: scaffoldSections
      summary: Auto-create standard thesis sections with page targets
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"

  /workspaces/{workspaceId}/sections/coherence:
    get:
      operationId: getSectionCoherence
      summary: Coherence report for thesis sections
      tags: [sections]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoherenceReport"

  /workspaces/{workspaceId}/sections/{sectionId}/chat/upload:
    post:
      operationId: uploadSectionChatFile
      summary: Upload file for section AI assistant
      tags: [chat]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK

  /workspaces/{workspaceId}/auto-complete/validate:
    get:
      operationId: validateAutoComplete
      summary: Validate auto-complete prerequisites
      tags: [thesis]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoCompleteValidation"

  /workspaces/{workspaceId}/auto-complete/stream:
    post:
      operationId: streamAutoComplete
      summary: Auto-complete entire thesis (SSE)
      tags: [thesis]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream

  /workspaces/{workspaceId}/auto-complete/cancel:
    post:
      operationId: cancelAutoComplete
      summary: Cancel running auto-complete
      tags: [thesis]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  # ─── AI CHAT ─────────────────────────────────────────────────────────────────
  /workspaces/{workspaceId}/sections/{sectionId}/chat:
    get:
      operationId: listChatMessages
      summary: List chat history for a section
      tags: [chat]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

    post:
      operationId: sendChatMessage
      summary: Send a message to the AI assistant
      tags: [chat]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /workspaces/{workspaceId}/sections/{sectionId}/chat/clear:
    delete:
      operationId: clearChatHistory
      summary: Clear chat history for a section
      tags: [chat]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cleared

  /workspaces/{workspaceId}/sections/{sectionId}/generate:
    post:
      operationId: generateSectionContent
      summary: AI-generate draft content for a section
      tags: [chat]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: sectionId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateContentInput"
      responses:
        "200":
          description: Generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedContent"

  # ─── VAULT ───────────────────────────────────────────────────────────────────
  /workspaces/{workspaceId}/vault:
    get:
      operationId: listVaultResources
      summary: List vault resources for a workspace
      tags: [vault]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultResource"

    post:
      operationId: createVaultResource
      summary: Add a resource to the vault
      tags: [vault]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultResourceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResource"

  /workspaces/{workspaceId}/vault/summary:
    get:
      operationId: getVaultSummary
      summary: Vault stats by type
      tags: [vault]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultSummary"

  /workspaces/{workspaceId}/vault/{resourceId}:
    get:
      operationId: getVaultResource
      summary: Get a vault resource
      tags: [vault]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: resourceId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResource"

    patch:
      operationId: updateVaultResource
      summary: Update a vault resource
      tags: [vault]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: resourceId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultResourceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultResource"

    delete:
      operationId: deleteVaultResource
      summary: Delete a vault resource
      tags: [vault]
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema:
            type: integer
        - in: path
          name: resourceId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ─── REFERENCE ───────────────────────────────────────────────────────────
    Domain:
      type: object
      required: [id, name, slug, description]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        color:
          type: ["string", "null"]

    Qualification:
      type: object
      required: [id, name, abbreviation, domain, level]
      properties:
        id:
          type: integer
        name:
          type: string
        abbreviation:
          type: string
        domain:
          type: string
        level:
          type: string

    College:
      type: object
      required: [id, name, city, state, domain]
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        state:
          type: string
        domain:
          type: string
        universityId:
          type: ["integer", "null"]

    University:
      type: object
      required: [id, name, city, state]
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        state:
          type: string

    # ─── USER PROFILE ────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, fullName, email, domain, qualification, onboardingComplete, createdAt]
      properties:
        id:
          type: integer
        supabaseUserId:
          type: string
          format: uuid
          nullable: true
        role:
          type: string
          enum: [scholar, admin]
        fullName:
          type: string
        email:
          type: string
        domain:
          type: string
        qualification:
          type: string
        collegeName:
          type: ["string", "null"]
        universityName:
          type: ["string", "null"]
        guideNames:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        onboardingComplete:
          type: boolean
        createdAt:
          type: string

    UserProfileInput:
      type: object
      required: [fullName, email, domain, qualification]
      properties:
        fullName:
          type: string
        email:
          type: string
        domain:
          type: string
        qualification:
          type: string
        collegeName:
          type: string
        universityName:
          type: string
        guideNames:
          type: string
        city:
          type: string
        state:
          type: string
        onboardingComplete:
          type: boolean

