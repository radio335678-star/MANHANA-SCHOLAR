# Render Blueprint — MANTHANA Scholar API (Express)
# Dashboard: https://dashboard.render.com → New → Blueprint → connect this repo
# Or: New Web Service → link GitHub → Render reads this file on sync.

services:
  - type: web
    name: manthana-scholar-api
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: >-
      export NODE_ENV=development &&
      corepack enable &&
      corepack prepare pnpm@9.15.4 --activate &&
      pnpm install --no-frozen-lockfile --prod=false --filter @workspace/api-server... &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server start
    # Liveness only — /api/healthz/ready returns 503 until DATABASE_URL + Supabase env are set.
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        sync: false
      - key: MOONSHOT_WEB_SEARCH
        sync: false
      - key: KIMI_PRIMARY_MODEL
        sync: false
      - key: KIMI_FALLBACK_MODELS
        sync: false
      # Optional: CORS_ALLOWED_ORIGINS=https://manhana-scholar.vercel.app
